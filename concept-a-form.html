<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>컨셉 A · 상세 · 등록 · CTMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root{
      --bg:#f6f7f9; --surface:#ffffff; --line:#ebedf0; --line-soft:#f1f3f5;
      --text:#1c2330; --muted:#717784; --muted-2:#9aa1ad;
      --accent:#4f46e5; --accent-soft:#eef0fe; --accent-text:#4338ca;
      --danger:#dc2626; --r-lg:18px; --sh-sm:0 1px 2px rgba(16,24,40,.04);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
    .muted{color:var(--muted)}
    .appbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:0 28px}
    .appbar-inner{display:flex;align-items:center;gap:28px;height:62px;max-width:1320px;margin:0 auto}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px;letter-spacing:-.02em}
    .brand .dot{width:30px;height:30px;border-radius:9px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:15px}
    .scr-tabs{display:flex;gap:4px;margin-left:8px;flex-wrap:wrap}
    .scr-tabs a{color:var(--muted);font-weight:600;font-size:14.5px;padding:9px 16px;border-radius:10px;transition:.18s;text-decoration:none}
    .scr-tabs a:hover{background:var(--line-soft);color:var(--text)}
    .scr-tabs a.active{background:var(--accent-soft);color:var(--accent-text)}
    .appbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
    .icon-btn{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:#fff;color:var(--muted);display:grid;place-items:center;cursor:pointer;font-size:18px;transition:.18s}
    .icon-btn:hover{background:var(--line-soft);color:var(--text)}
    .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px}
    .page{max-width:1320px;margin:0 auto;padding:30px 28px 64px}
    .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:26px;flex-wrap:wrap}
    .crumb{font-size:13px;color:var(--muted-2);font-weight:500;margin-bottom:7px}
    .crumb i{font-size:10px;margin:0 5px;vertical-align:1px}
    h1.title{font-size:27px;font-weight:800;margin:0;letter-spacing:-.02em}
    .subtitle{color:var(--muted);margin:7px 0 0;font-size:14.5px}
    .btn-x{display:inline-flex;align-items:center;gap:7px;border-radius:11px;font-weight:600;font-size:14.5px;padding:10px 18px;border:1px solid transparent;cursor:pointer;font-family:inherit;transition:.18s;text-decoration:none}
    .btn-primary-x{background:var(--accent);color:#fff}
    .btn-primary-x:hover{background:#4338ca}
    .btn-ghost-x{background:#fff;border-color:var(--line);color:var(--text)}
    .btn-ghost-x:hover{background:var(--line-soft)}
    .card-x{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-sm)}
    .card-pad{padding:22px 24px}
    .badge-x{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;padding:4px 11px;border-radius:99px}
    .b-accent{color:var(--accent-text);background:var(--accent-soft)}
    .form-tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:26px}
    .form-tabs button{border:0;background:transparent;font-family:inherit;font-weight:600;font-size:14.5px;color:var(--muted);padding:13px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
    .form-tabs button.active{color:var(--accent-text);border-bottom-color:var(--accent)}
    .form-section{margin-bottom:28px}
    .fs-title{font-size:15px;font-weight:700;margin:0 0 4px}
    .fs-desc{font-size:13.5px;color:var(--muted);margin:0 0 18px}
    .frow{display:grid;grid-template-columns:repeat(2,1fr);gap:18px 22px}
    .field label{display:block;font-size:13.5px;font-weight:600;margin-bottom:7px}
    .field label .req{color:var(--danger);margin-left:3px}
    .field .inp,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 14px;font-size:14.5px;font-family:inherit;background:#fff;outline:none;transition:.18s;color:var(--text)}
    .field .inp:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
    .field .hint{font-size:12.5px;color:var(--muted-2);margin-top:6px}
    .field.colspan2{grid-column:span 2}
    .seg{display:flex;border:1px solid var(--line);border-radius:11px;overflow:hidden;width:max-content}
    .seg button{border:0;background:#fff;font-family:inherit;font-weight:600;font-size:14px;color:var(--muted);padding:10px 18px;cursor:pointer}
    .seg button.on{background:var(--accent);color:#fff}
    .upload{border:1.5px dashed var(--line);border-radius:14px;padding:30px;text-align:center;color:var(--muted)}
    .upload i{font-size:28px;color:var(--muted-2)}
    .hr{height:1px;background:var(--line);border:0;margin:26px 0}
    @media(max-width:768px){.frow{grid-template-columns:1fr}.field.colspan2{grid-column:span 1}}
    .mode-toggle{display:flex;gap:4px;background:var(--line-soft);border-radius:11px;padding:4px;width:max-content;margin-bottom:24px}
    .mode-toggle a{font-size:13.5px;font-weight:600;color:var(--muted);padding:8px 16px;border-radius:8px;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
    .mode-toggle a.active{background:#fff;color:var(--accent-text);box-shadow:var(--sh-sm)}
  </style>
</head>
<body>
  <div class="appbar">
    <div class="appbar-inner">
      <a href="index.html" class="brand" style="text-decoration:none;color:inherit"><span class="dot">C</span> CTMS</a>
      <div class="scr-tabs">
        <a href="concept-a-clean.html">대시보드</a>
        <a href="concept-a-list.html">프로젝트 목록</a>
        <a class="active" href="concept-a-form.html">상세 · 등록</a>
      </div>
      <div class="appbar-right">
        <span class="badge-x b-accent" style="font-weight:700">컨셉 A · 클린 &amp; 미니멀</span>
        <div class="icon-btn"><i class="bi bi-search"></i></div>
        <div class="icon-btn"><i class="bi bi-bell"></i></div>
        <div class="avatar">황</div>
      </div>
    </div>
  </div>

  <div class="page">
    <div class="page-head">
      <div>
        <div class="crumb">홈 <i class="bi bi-chevron-right"></i> 파트너관리 <i class="bi bi-chevron-right"></i> 기관 등록</div>
        <h1 class="title">임상기관 등록</h1>
        <p class="subtitle">신규 임상시험 실시기관 정보를 입력합니다.</p>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn-x btn-ghost-x">취소</button>
        <button class="btn-x btn-ghost-x"><i class="bi bi-save"></i> 임시저장</button>
        <button class="btn-x btn-primary-x"><i class="bi bi-check-lg"></i> 등록 완료</button>
      </div>
    </div>

    <div class="card-x card-pad" style="max-width:920px">
      <div class="mode-toggle">
        <a class="active" href="concept-a-form.html"><i class="bi bi-text-paragraph"></i> 기본(상단 라벨)</a>
        <a href="concept-a-form-ig.html"><i class="bi bi-input-cursor-text"></i> input-group(좌측 라벨)</a>
      </div>
      <div class="form-tabs">
        <button class="active">기본 정보</button>
        <button>담당자</button>
        <button>계약 / 첨부</button>
      </div>

      <div class="form-section">
        <p class="fs-title">기관 기본 정보</p>
        <p class="fs-desc">기관의 식별 정보와 분류를 입력하세요.</p>
        <div class="frow">
          <div class="field"><label>기관명 <span class="req">*</span></label><input class="inp" placeholder="예) 서울대학교병원"></div>
          <div class="field"><label>기관 코드 <span class="req">*</span></label><input class="inp" placeholder="예) SNUH-001"></div>
          <div class="field"><label>기관 유형</label><select><option>상급종합병원</option><option>종합병원</option><option>병원</option><option>의원</option></select></div>
          <div class="field"><label>지역</label><select><option>서울</option><option>경기</option><option>인천</option><option>대전</option></select></div>
          <div class="field colspan2"><label>주소</label><input class="inp" placeholder="도로명 주소를 입력하세요"></div>
        </div>
      </div>

      <hr class="hr">

      <div class="form-section">
        <p class="fs-title">상태 및 분류</p>
        <p class="fs-desc">기관의 활성 상태와 임상 참여 단계를 지정하세요.</p>
        <div class="frow">
          <div class="field"><label>활성 상태</label>
            <div class="seg"><button class="on">활성</button><button>비활성</button><button>보류</button></div>
          </div>
          <div class="field"><label>참여 단계</label><select><option>1상</option><option>2상</option><option>3상</option><option>전체</option></select></div>
          <div class="field colspan2"><label>비고</label><textarea rows="3" placeholder="추가 설명을 입력하세요"></textarea><div class="hint">최대 500자까지 입력할 수 있습니다.</div></div>
        </div>
      </div>

      <hr class="hr">

      <div class="form-section" style="margin-bottom:0">
        <p class="fs-title">첨부 파일</p>
        <p class="fs-desc">기관 인증서, 계약서 등을 첨부하세요.</p>
        <div class="upload"><i class="bi bi-cloud-arrow-up"></i><div style="margin-top:8px;font-weight:600;color:var(--text)">파일을 끌어다 놓거나 클릭하여 업로드</div><div style="font-size:13px;margin-top:4px">PDF, DOCX, PNG · 최대 20MB</div></div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.form-tabs button, .seg button').forEach(b=>{
      b.addEventListener('click',()=>{
        b.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('active','on'));
        b.classList.add(b.parentElement.classList.contains('form-tabs')?'active':'on');
      });
    });
  </script>
</body>
</html>
